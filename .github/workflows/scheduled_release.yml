name: Scheduled Release

on:
    schedule:
        - cron: '0 0 * * 2'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    check_new_commits:
        runs-on: ubuntu-latest
        outputs:
            has-changes: ${{ steps.check_commits.outputs.has-changes }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Check for new commits
              id: check_commits
              uses: isaac-cf-wong/detect-git-changes-action@4a23ba472b25d0d5350ed22ce9c31f7964a8a81c # v0.0.5
              with:
                  use-latest-tag: true

    ci:
        needs: check_new_commits
        if: ${{ needs.check_new_commits.outputs.has-changes }}
        uses: ./.github/workflows/ci.yml

    codeql:
        needs: check_new_commits
        if: ${{ needs.check_new_commits.outputs.has-changes }}
        uses: ./.github/workflows/codeql.yml
        permissions:
            security-events: write
            actions: read
            contents: read

    create_tag:
        needs: [ci, codeql]
        runs-on: ubuntu-latest
        outputs:
            new_tag: ${{ steps.tag_version.outputs.new_tag }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Install uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
              with:
                  python-version: '3.13'
                  enable-cache: 'true'

            - name: Install dependencies
              run: uv sync --extra release --frozen

            - name: Bump version and push tag
              id: tag_version
              run: |
                  PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
                  if [ "$PREVIOUS_TAG" = "none" ]; then
                    NEW_TAG="v0.1.0"
                  else
                    NEW_TAG=$(uv run --frozen git-cliff --bumped-version --config cliff.toml 2>/dev/null)
                  fi
                  if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
                    echo "Creating annotated tag $NEW_TAG"

                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                    git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
                    git push origin "$NEW_TAG"
                  else
                    echo "Tag $NEW_TAG already exists, skipping."
                    exit 1
                  fi
                  echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
                  echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

            - name: Output tag information
              if: ${{ steps.check_commits.outputs.has-changes == 'true' }}
              run: |
                  echo "### Tag Created :rocket:" >> $GITHUB_STEP_SUMMARY
                  echo "- **New tag**: ${{ steps.tag_version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Previous tag**: ${{ steps.tag_version.outputs.previous_tag }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Changelog**: ${{ steps.tag_version.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY

    release:
        needs: create_tag
        uses: ./.github/workflows/release.yml
        permissions:
            contents: write
            id-token: write
        with:
            tag_name: ${{ needs.create_tag.outputs.new_tag }}

    build:
        needs: release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ needs.create_tag.outputs.new_tag }}
                  fetch-depth: 0

            - name: Output build information
              run: |
                  echo "### Publishing Build :package:" >> $GITHUB_STEP_SUMMARY
                  echo "- **Version tag**: ${{ needs.create_tag.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY

            - name: Install uv
              uses: astral-sh/setup-uv@7
              with:
                  python-version: '3.14.3'
                  enable-cache: 'true'

            - name: Install dependencies
              run: uv sync --frozen

            - name: Build distribution
              run: uv build

            - name: Upload build artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
              with:
                  name: python-package-distributions
                  path: dist/

    publish-to-pypi:
        needs: build
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
            attestations: write

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
              with:
                  name: python-package-distributions
                  path: dist/

            - name: Generate attestation
              uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
              with:
                  subject-path: dist/*

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
              # Remove this line if you want the workflow to fail on publish errors
              # This is added for this template only since the environment 'pypi' is
              # not created to avoid publishing
              continue-on-error: true
              with:
                  packages-dir: dist/
