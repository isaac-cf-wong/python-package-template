name: CI
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:
    workflow_call:

jobs:
    test:
        strategy:
            matrix:
                python-version: ['3.12', '3.13', '3.14']
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install uv
              uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: 'true'

            - name: Install dependencies
              run: uv sync --extra test,ci --frozen

            - name: Run tests with pytest
              run: uv run --frozen pytest

            - name: Upload coverage to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    codeql:
        if:
            ${{ github.event_name == 'push' || github.event_name ==
            'pull_request' || github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_call') }}
        name: codeql
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Initialize CodeQL
              uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
              with:
                  languages: python

            - name: Autobuild
              uses: github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98 # v4

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
